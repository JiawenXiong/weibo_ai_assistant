<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>微博AI助手</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #fff;
      color: #333;
    }

    .popup-container {
      padding: 0;
    }

    .header {
      background: linear-gradient(135deg, #ff8200 0%, #ff9a3c 100%);
      color: #fff;
      padding: 20px;
      text-align: center;
    }

    .header h1 {
      font-size: 20px;
      margin-bottom: 4px;
    }

    .header p {
      font-size: 12px;
      opacity: 0.9;
    }

    .content {
      padding: 16px;
    }

    .status-card {
      background-color: #f8f9fa;
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
    }

    .status-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .status-label {
      font-size: 14px;
      color: #666;
    }

    .status-value {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 14px;
      font-weight: 500;
    }

    .status-value.success {
      color: #4caf50;
    }

    .status-value.warning {
      color: #ff9800;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
    }

    .status-dot.success {
      background-color: #4caf50;
    }

    .status-dot.warning {
      background-color: #ff9800;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 12px 16px;
      font-size: 14px;
      font-weight: 500;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s, transform 0.1s;
    }

    .btn-primary {
      background-color: #ff8200;
      color: #fff;
    }

    .btn-primary:hover {
      background-color: #e67300;
    }

    .btn-secondary {
      background-color: #f0f0f0;
      color: #333;
    }

    .btn-secondary:hover {
      background-color: #e0e0e0;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn + .btn {
      margin-top: 8px;
    }

    .btn svg {
      width: 16px;
      height: 16px;
    }

    .info-section {
      margin-top: 16px;
      padding-top: 16px;
      border-top: 1px solid #eee;
    }

    .info-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 12px;
      color: #666;
      line-height: 1.5;
    }

    .info-item:last-child {
      margin-bottom: 0;
    }

    .info-icon {
      flex-shrink: 0;
      margin-top: 2px;
    }

    .footer {
      padding: 12px 16px;
      background-color: #f8f9fa;
      border-top: 1px solid #eee;
      text-align: center;
    }

    .footer-text {
      font-size: 11px;
      color: #999;
    }
  </style>
</head>
<body>
  <div class="popup-container">
    <div class="header">
      <h1>🤖 微博AI助手</h1>
      <p>智能分析微博内容</p>
    </div>

    <div class="content">
      <div class="status-card">
        <div class="status-row">
          <span class="status-label">API 状态</span>
          <span id="apiStatus" class="status-value warning">
            <span class="status-dot warning"></span>
            未配置
          </span>
        </div>
      </div>

      <button id="settingsBtn" class="btn btn-primary">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        打开设置
      </button>

      <div class="info-section">
        <div class="info-item">
          <span class="info-icon">📌</span>
          <span>在微博页面中，每条微博下方会显示「AI分析」按钮</span>
        </div>
        <div class="info-item">
          <span class="info-icon">💡</span>
          <span>点击按钮即可使用AI分析当前微博内容</span>
        </div>
      </div>
    </div>

    <div class="footer">
      <span class="footer-text">版本 1.0.0</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
